/* MOUSE NA TELA INICIAL */
function pegarPosicaoMouseNoCanvas(evento) {
  const rect = tela.getBoundingClientRect();
  const escalaX = tela.width / rect.width;
  const escalaY = tela.height / rect.height;

  const mouseX = (evento.clientX - rect.left) * escalaX;
  const mouseY = (evento.clientY - rect.top) * escalaY;

  return { mouseX, mouseY };
}

function mouseEstaNoBotaoIniciar(mouseX, mouseY) {
  return (
    mouseX >= botaoIniciar.x &&
    mouseX <= botaoIniciar.x + botaoIniciar.largura &&
    mouseY >= botaoIniciar.y &&
    mouseY <= botaoIniciar.y + botaoIniciar.altura
  );
}

tela.addEventListener('mousemove', (evento) => {
  if (fase !== 'inicio') {
    tela.style.cursor = 'default';
    mouseEmCimaDoBotaoIniciar = false;
    return;
  }

  const posicao = pegarPosicaoMouseNoCanvas(evento);

  mouseEmCimaDoBotaoIniciar = mouseEstaNoBotaoIniciar(
    posicao.mouseX,
    posicao.mouseY
  );

  tela.style.cursor = mouseEmCimaDoBotaoIniciar ? 'pointer' : 'default';
});

tela.addEventListener('mouseleave', () => {
  mouseEmCimaDoBotaoIniciar = false;
  tela.style.cursor = 'default';
});

tela.addEventListener('click', (evento) => {
  if (fase !== 'inicio') return;

  const posicao = pegarPosicaoMouseNoCanvas(evento);

  if (mouseEstaNoBotaoIniciar(posicao.mouseX, posicao.mouseY)) {
    iniciarJogoDeVerdade();
  }
});

/* TECLADO */
window.addEventListener('keydown', (evento) => {
  const tecla = evento.key.toLowerCase();

  if (
    tecla === 'arrowright' ||
    tecla === 'arrowleft' ||
    tecla === 'arrowup' ||
    tecla === 'a' ||
    tecla === 'd' ||
    tecla === 'w' ||
    evento.key === ' '
  ) {
    evento.preventDefault();
  }

  if (fase === 'inicio') {
    if (tecla === 'enter' || evento.key === ' ') {
      iniciarJogoDeVerdade();
    }
    return;
  }

  if (escolhaMensagemAtiva) {
    if (tecla === '1') escolherRespostaMensagem(1);
    if (tecla === '2') escolherRespostaMensagem(2);
    return;
  }

  if (podeAbrirCelular && tecla === 'c') {
    abrirCelularComTeclaC();
    return;
  }

  if (escolhaCelularAtiva) {
    if (tecla === '1') escolherSituacaoCelular(1);
    if (tecla === '2') escolherSituacaoCelular(2);
    return;
  }

  if (escolhaProfessorAtiva) {
    if (tecla === '1') escolherRespostaProfessor(1);
    if (tecla === '2') escolherRespostaProfessor(2);
    return;
  }

  if (escolhaBananaAtiva) {
    if (tecla === '1') escolherSituacaoBanana(1);
    if (tecla === '2') escolherSituacaoBanana(2);
    return;
  }

  if (escolhaPatioAtiva) {
    if (tecla === '1') escolherSituacaoPatio(1);
    if (tecla === '2') escolherSituacaoPatio(2);
    return;
  }

  if (escolhaAtiva) {
    if (tecla === '1') escolherPrimeiraSituacao(1);
    if (tecla === '2') escolherPrimeiraSituacao(2);
    if (tecla === '3') escolherPrimeiraSituacao(3);
    return;
  }

  if (dialogoAberto) {
    if (tecla === 'e' || tecla === 'enter' || evento.key === ' ') {
      avancarDialogo();
    }
    return;
  }

  teclas[tecla] = true;

  if (
    (evento.key === ' ' || evento.key === 'ArrowUp' || tecla === 'w') &&
    tiago.noChao &&
    !tiagoSentado
  ) {
    tiago.velocidadeY = tiago.forcaPulo;
    tiago.noChao = false;
  }

  if (tecla === 'e') interagir();
  if (tecla === 'r') reiniciarJogo();
});

window.addEventListener('keyup', (evento) => {
  teclas[evento.key.toLowerCase()] = false;
});

  tela.style.cursor = 'default';

  fecharDialogo();

  tiago.noChao = true;
  tiago.direcao = 1;

  mostrarAvisoPrimeiroDia = true;
  tempoAvisoPrimeiroDia = 180;
}

function pegarChaoAtual() {
  if (fase === 'fora') return areaFora.chaoY;
  if (fase === 'corredor') return areaCorredor.chaoY;
  if (fase === 'patio') return areaPatio.chaoY;
  if (fase === 'informatica') return areaInformatica.chaoY;
  return areaSala.chaoY;
}

function pegarLarguraMapaAtual() {
  if (fase === 'fora') return areaFora.larguraMapa;
  if (fase === 'corredor') return areaCorredor.larguraMapa;
  if (fase === 'patio') return areaPatio.larguraMapa;
  if (fase === 'informatica') return areaInformatica.larguraMapa;
  return areaSala.larguraMapa;
}

function estaPerto(a, b, distancia) {
  return Math.abs(a - b) <= distancia;

function interagir() {
  if (
    fase === 'fora' &&
    estaPerto(tiago.x + tiago.largura / 2, areaFora.escola.portaX, 55) &&
    tiago.noChao
  ) {
    irParaCorredor();
    return;
  }

  if (
    fase === 'corredor' &&
    entradaInformaticaLiberada &&
    estaPerto(tiago.x + tiago.largura / 2, areaCorredor.informaticaX, 80) &&
    tiago.noChao
  ) {
    irParaInformatica();
    return;
  }

  if (
    fase === 'corredor' &&
    !intervaloLiberado &&
    !entradaInformaticaLiberada &&
    estaPerto(tiago.x + tiago.largura / 2, areaCorredor.sala103X, 70) &&
    tiago.noChao
  ) {
    irParaSala();
    return;
  }

  if (
    fase === 'corredor' &&
    intervaloLiberado &&
    cenaCorredorBanana === 'inativo' &&
    !entradaInformaticaLiberada &&
    estaPerto(tiago.x + tiago.largura / 2, areaCorredor.patioX, 90) &&
    tiago.noChao
  ) {
    irParaPatio();
    return;
  }

  if (
    fase === 'sala' &&
    !tiagoSentado &&
    !alunosForamIntervalo &&
    !dialogoAberto &&
    estaPerto(tiago.x + tiago.largura / 2, areaSala.cadeiraVagaX + 60, 120) &&
    tiago.noChao
  ) {
    sentarTiago();
    return;
  }

  if (
    fase === 'sala' &&
    alunosForamIntervalo &&
    estaPerto(tiago.x + tiago.largura / 2, areaSala.portaX, 100) &&
    tiago.noChao
  ) {
    irParaCorredor();
    return;
  }

  if (
    fase === 'patio' &&
    saidaPatioLiberada &&
    estaPerto(tiago.x + tiago.largura / 2, areaPatio.portaSaidaX, 110) &&
    tiago.noChao
  ) {
    iniciarCenaBananaNoCorredor();
    return;
  }

  if (
    fase === 'informatica' &&
    saidaInformaticaLiberada &&
    estaPerto(tiago.x + tiago.largura / 2, areaInformatica.portaX, 100) &&
    tiago.noChao
  ) {
    sairDaSalaInformatica();
    return;
  }

  if (
    fase === 'patio' &&
    cenaPatio === 'livre' &&
    estaPerto(tiago.x + tiago.largura / 2, areaPatio.meninoFalsoX + 100, 150) &&
    tiago.noChao
  ) {
    abrirDialogoPatio();
    return;
  }
}

/* DIÁLOGO */
function abrirDialogo(sequencia, aoFinal = null) {
  dialogoAberto = true;
  escolhaAtiva = false;
  escolhaPatioAtiva = false;
  escolhaBananaAtiva = false;
  escolhaCelularAtiva = false;
  escolhaProfessorAtiva = false;
  escolhaMensagemAtiva = false;
  sequenciaDialogo = sequencia;
  indiceDialogo = 0;
  callbackFimDialogo = aoFinal;

  opcoesDialogo.style.display = 'none';
  mostrarLinhaAtual();
}

function mostrarLinhaAtual() {
  if (!sequenciaDialogo[indiceDialogo]) return;

  const fala = sequenciaDialogo[indiceDialogo];

  caixaDialogo.style.display = 'block';
  nomeFalante.textContent = fala.nome;
  textoDialogo.textContent = fala.texto;
  dicaDialogo.textContent = 'Aperte E, Enter ou Espaço para continuar';
}

function avancarDialogo() {
  indiceDialogo++;

  if (indiceDialogo < sequenciaDialogo.length) {
    mostrarLinhaAtual();
    return;
  }

  fecharDialogo();

  if (callbackFimDialogo) {
    const funcaoFinal = callbackFimDialogo;
    callbackFimDialogo = null;
    funcaoFinal();
  }
}

/* ATUALIZAÇÃO */
function atualizarAnimacao() {
  if (!tiago.noChao) return;

  if (estaAndando) {
    tempoAnimacao++;

    if (tempoAnimacao >= 10) {
      tempoAnimacao = 0;
      quadroAnimacao = quadroAnimacao === 0 ? 1 : 0;
    }
  } else {
    quadroAnimacao = 0;
    tempoAnimacao = 0;
  }
}

function atualizarMovimentoTiago() {
  estaAndando = false;

  if (fase === 'inicio') return;

  if (
    fase === 'patio' &&
    (
      cenaPatio === 'cadeirante_saindo' ||
      cenaPatio === 'falso_falando_saida' ||
      cenaPatio === 'falso_saindo'
    )
  ) return;

  if (
    fase === 'corredor' &&
    cenaCorredorBanana !== 'inativo' &&
    cenaCorredorBanana !== 'finalizado'
  ) return;

  if (
    fase === 'corredor' &&
    cenaCorredorInformatica !== 'inativo' &&
    !entradaInformaticaLiberada
  ) return;

  if (fase === 'informatica' && cenaInformatica !== 'porta_liberada') return;

  if (
    fase === 'corredor' &&
    cenaMensagemCelular !== 'inativo' &&
    cenaMensagemCelular !== 'finalizado'
  ) return;

  if (
    dialogoAberto ||
    escolhaAtiva ||
    escolhaPatioAtiva ||
    escolhaBananaAtiva ||
    escolhaCelularAtiva ||
    escolhaProfessorAtiva ||
    tiagoSentado
  ) return;

  if (teclas['arrowright'] || teclas['d']) {
    tiago.x += tiago.velocidade;
    tiago.direcao = 1;
    estaAndando = true;
  }

  if (teclas['arrowleft'] || teclas['a']) {
    tiago.x -= tiago.velocidade;
    tiago.direcao = -1;
    estaAndando = true;
  }

  tiago.velocidadeY += tiago.gravidade;
  tiago.y += tiago.velocidadeY;

  const chaoY = pegarChaoAtual();

  if (tiago.y >= chaoY - tiago.altura) {
    tiago.y = chaoY - tiago.altura;
    tiago.velocidadeY = 0;
    tiago.noChao = true;
  }

  tiago.x = Math.max(0, Math.min(pegarLarguraMapaAtual() - tiago.largura, tiago.x));
}

function atualizarCenaSala() {
  if (fase !== 'sala') return;

  if (cenaSala === 'menino_andando') {
    meninoFalso.x += meninoFalso.velocidade;

    if (meninoFalso.x >= areaSala.meninoFalsoDestinoX) {
      meninoFalso.x = areaSala.meninoFalsoDestinoX;
      meninoFalso.andando = false;
      cenaSala = 'dialogo';

      abrirDialogo(
        [
          {
            nome: 'Arthur',
            texto: 'Olha aquele menino de oculos... que estranho né?'
          }
        ],
        () => {
          abrirEscolhaPrimeiraSituacao();
        }
      );
    }
  }

  if (cenaSala === 'menino_voltando') {
    meninoFalso.x -= meninoFalso.velocidade;

    if (meninoFalso.x <= areaSala.meninoFalsoInicioX) {
      meninoFalso.x = areaSala.meninoFalsoInicioX;
      meninoFalso.andando = false;
      meninoFalso.direcao = 1;
      meninoFalsoSaiuDaCadeira = false;
      cenaSala = 'finalizado';

      iniciarIntervalo();
    }
  }
}

function atualizarCenaCorredorBanana() {
  if (fase !== 'corredor') return;
  if (cenaCorredorBanana === 'inativo' || cenaCorredorBanana === 'finalizado') return;

  if (cenaCorredorBanana === 'falso_trazendo') {
    meninoFalsoCorredor.x += meninoFalsoCorredor.velocidade;

    if (meninoFalsoCorredor.x >= meninoFalsoCorredor.alvoX) {
      meninoFalsoCorredor.x = meninoFalsoCorredor.alvoX;
      cenaCorredorBanana = 'escolha';

      abrirDialogo(
        [
          {
            nome: 'Arthur',
            texto: 'Pega essa casca e coloca no chão. Vai ser engraçado.'
          }
        ],
        () => {
          abrirEscolhaBanana();
        }
      );
    }
  }

  if (cenaCorredorBanana === 'tiago_jogando' && !dialogoAberto) {
    animacaoTiagoJogandoBanana++;

    const baseY = areaCorredor.chaoY - tiago.altura;
    const alturaPulo = Math.sin(Math.min(animacaoTiagoJogandoBanana, 30) / 30 * Math.PI) * 45;
    tiago.y = baseY - alturaPulo;

    if (animacaoTiagoJogandoBanana >= 38) {
      tiago.y = baseY;
      banana.x = tiago.x + 125;
      banana.y = areaCorredor.chaoY - banana.altura + 6;
      bananaNoChao = true;
      iniciarMeninoOculosAndandoParaCasca();
    }
  }

  if (cenaCorredorBanana === 'falso_colocando') {
    const alvoBanana = tiago.x + 125;

    if (meninoFalsoCorredor.x < alvoBanana - 60) {
      meninoFalsoCorredor.x += meninoFalsoCorredor.velocidade;
      meninoFalsoCorredor.direcao = 1;
    } else {
      banana.x = alvoBanana;
      banana.y = areaCorredor.chaoY - banana.altura + 6;
      bananaNoChao = true;
      iniciarMeninoOculosAndandoParaCasca();
    }
  }

  if (cenaCorredorBanana === 'oculos_andando') {
    if (!meninoOculosCaiu) {
      meninoOculosCorredor.x -= meninoOculosCorredor.velocidade;

      if (meninoOculosCorredor.x <= banana.x + 30) {
        meninoOculosCorredor.x = banana.x + 30;
        meninoOculosCaiu = true;

        setTimeout(() => {
          abrirConsequenciaBanana();
        }, 500);
      }
    }
  }
}

function atualizarCenaCorredorInformatica() {
  if (fase !== 'corredor') return;
  if (cenaCorredorInformatica === 'inativo') return;

  if (cenaCorredorInformatica === 'falso_saindo') {
    meninoFalsoCorredor.x += meninoFalsoCorredor.velocidade;

    if (meninoFalsoCorredor.x > tiago.x + 520) {
      meninoFalsoSaiuCorredor = true;
      cenaCorredorInformatica = 'oculos_levantando';
      meninoOculosCaiu = false;
      meninoOculosCorredor.direcao = 1;
    }
  }

  if (cenaCorredorInformatica === 'oculos_levantando') {
    meninoOculosCorredor.x += meninoOculosCorredor.velocidade;

    if (meninoOculosCorredor.x > tiago.x + 620) {
      meninoOculosSaiuCorredor = true;
      cenaCorredorInformatica = 'loira_chegando';
      meninaLoiraCorredor.x = tiago.x - 520;
      meninaLoiraCorredor.y = areaCorredor.chaoY - meninaLoiraCorredor.altura + 5;
      meninaLoiraCorredor.alvoX = tiago.x - 155;
      meninaLoiraCorredor.direcao = 1;
    }
  }

  if (cenaCorredorInformatica === 'loira_chegando') {
    meninaLoiraCorredor.x += meninaLoiraCorredor.velocidade;

    if (meninaLoiraCorredor.x >= meninaLoiraCorredor.alvoX) {
      meninaLoiraCorredor.x = meninaLoiraCorredor.alvoX;
      cenaCorredorInformatica = 'loira_dialogo';

      abrirDialogo(
        [
          {
            nome: 'Juliana',
            texto: 'Vamos, agora é aula de informática.'
          }
        ],
        () => {
          alunosCorredorSumiram = true;
          entradaInformaticaLiberada = true;
          cenaCorredorInformatica = 'liberado';

          tiago.x = areaCorredor.patioX + 70;
          tiago.y = areaCorredor.chaoY - tiago.altura;
          tiago.direcao = -1;
        }
      );
    }
  }
}

function atualizarCenaInformatica() {
  if (fase !== 'informatica') return;

  if (
    (cenaInformatica === 'bronca_dois' || cenaInformatica === 'bronca_falso') &&
    professorAndando
  ) {
    professorInformatica.x += professorInformatica.velocidade;

    if (professorInformatica.x >= professorInformatica.alvoX) {
      professorInformatica.x = professorInformatica.alvoX;
      professorAndando = false;

      if (cenaInformatica === 'bronca_dois') {
        abrirDialogo(
          [
            {
              nome: 'Professor',
              texto: 'Os dois, guarda o celular.'
            }
          ],
          () => {
            abrirEscolhaProfessor();
          }
        );
      }

      if (cenaInformatica === 'bronca_falso') {
        abrirDialogo(
          [
            {
              nome: 'Professor',
              texto: 'Guarda esse celular agora.'
            },
            {
              nome: 'Arthur',
              texto: 'Tá bom.'
            }
          ],
          () => {
            meninoFalsoMexendoCelular = false;
            iniciarSaidaDaSalaInformatica();
          }
        );
      }
    }
  }

  if (cenaInformatica === 'professor_saindo') {
    professorInformatica.x -= professorInformatica.velocidade;

    if (professorInformatica.x <= -220) {
      professorNaSala = false;
      professorAndando = false;
      iniciarSaidaDaSalaInformatica();
    }
  }

  if (cenaInformatica === 'saindo_da_sala') {
    if (!professorSaiuInformatica && professorNaSala) {
      professorInformatica.x -= professorInformatica.velocidade;
      professorInformatica.direcao = -1;

      if (professorInformatica.x <= -240) {
        professorSaiuInformatica = true;
        professorNaSala = false;
        professorAndando = false;
      }
    } else {
      professorSaiuInformatica = true;
    }

    if (!arthurSaiuInformatica) {
      meninoFalsoInformatica.x -= meninoFalsoInformatica.velocidade;
      meninoFalsoInformatica.direcao = -1;

      if (meninoFalsoInformatica.x <= -220) {
        arthurSaiuInformatica = true;
      }
    }

    if (professorSaiuInformatica && arthurSaiuInformatica) {
      aulaInformaticaFinalizada = true;
      saidaInformaticaLiberada = true;
      cenaInformatica = 'porta_liberada';
    }
  }
}

function atualizarJogo() {
  atualizarPainel();

  if (mostrarAvisoPrimeiroDia) {
    tempoAvisoPrimeiroDia--;

    if (tempoAvisoPrimeiroDia <= 0) {
      mostrarAvisoPrimeiroDia = false;
    }
  }

  if (mostrarAvisoAlarme) {
    tempoAvisoAlarme--;

    if (tempoAvisoAlarme <= 0) {
      mostrarAvisoAlarme = false;
    }
  }

  if (notificacaoCelularAtiva) {
    tempoNotificacaoCelular--;

    if (tempoNotificacaoCelular <= 0) {
      notificacaoCelularAtiva = false;
    }
  }

  if (fase === 'inicio') return;

  atualizarMovimentoTiago();
  atualizarCenaSala();
  atualizarCenaPatio();
  atualizarCenaCorredorBanana();
  atualizarCenaCorredorInformatica();
  atualizarCenaInformatica();
  atualizarAnimacao();
}

/* DESENHO */
function pegarCameraX(larguraMapa) {
  return Math.max(
    0,
    Math.min(larguraMapa - LARGURA_VISAO, tiago.x - LARGURA_VISAO / 2 + tiago.largura / 2)
  );
}

function desenharChaoDeTijolo(cameraX, chaoY, larguraMapa, alturaMapa) {
  const origemX = 10;
  const origemY = 10;
  const larguraRecorte = 32;
  const alturaRecorte = 32;

  for (let y = chaoY; y < alturaMapa; y += BLOCO) {
    for (
      let x = Math.floor(cameraX / BLOCO) * BLOCO;
      x < cameraX + LARGURA_VISAO + BLOCO;
      x += BLOCO
    ) {
      contexto.drawImage(
        imagemChao,
        origemX,
        origemY,
        larguraRecorte,
        alturaRecorte,
        Math.floor(x - cameraX),
        y,
        BLOCO,
        BLOCO
      );
    }
  }
}

function pegarImagemDoTiago() {
  if (!tiago.noChao) {
    return imagemTiagoPulando;
  }

  if (estaAndando) {
    return quadroAnimacao === 0 ? imagemTiagoAndando1 : imagemTiagoAndando2;
  }

  return imagemTiagoParado;
}

function desenharTiago(cameraX) {
  contexto.save();

  const imagemTiagoAtual = pegarImagemDoTiago();
  const posicaoX = Math.floor(tiago.x - cameraX);

  let ajusteY = 0;
  if (fase === 'fora') ajusteY = 16;

  const posicaoY = Math.floor(tiago.y + ajusteY);

  if (tiago.direcao === -1) {
    contexto.scale(-1, 1);
    contexto.drawImage(
      imagemTiagoAtual,
      -posicaoX - tiago.largura,
      posicaoY,
      tiago.largura,
      tiago.altura
    );
  } else {
    contexto.drawImage(
      imagemTiagoAtual,
      posicaoX,
      posicaoY,
      tiago.largura,
      tiago.altura
    );
  }

  contexto.restore();
}

function desenharImagem(imagem, x, y, largura, altura) {
  contexto.drawImage(
    imagem,
    Math.floor(x - cameraX),
    Math.floor(y),
    largura,
    altura
  );
}

function desenharImagemVirada(imagem, x, y, largura, altura, direcao) {
  contexto.save();

  const posicaoX = Math.floor(x - cameraX);
  const posicaoY = Math.floor(y);

  if (direcao === -1) {
    contexto.scale(-1, 1);
    contexto.drawImage(
      imagem,
      -posicaoX - largura,
      posicaoY,
      largura,
      altura
    );
  } else {
    contexto.drawImage(
      imagem,
      posicaoX,
      posicaoY,
      largura,
      altura
    );
  }

  contexto.restore();
}

function desenharAlunoSentado(imagem, x, y, largura = TAMANHO_ALUNO_SENTADO.largura, altura = TAMANHO_ALUNO_SENTADO.altura) {
  contexto.drawImage(
    imagem,
    Math.floor(x - cameraX),
    Math.floor(y),
    largura,
    altura
  );
}

function desenharTiagoSentado() {
  contexto.drawImage(
    imagemTiagoSentado,
    Math.floor(areaSala.cadeiraVagaX - cameraX),
    Math.floor(areaSala.cadeiraVagaY),
    TAMANHO_TIAGO_SENTADO.largura,
    TAMANHO_TIAGO_SENTADO.altura
  );
}

function desenharMeninoFalso(cameraX) {
  let imagemAtual;

  if (cenaSala === 'menino_voltando') {
    imagemAtual = meninoFalso.andando
      ? imagemMeninoFalsoAndandoCostas
      : imagemMeninoFalsoCostas;

    desenharImagem(
      imagemAtual,
      meninoFalso.x,
      meninoFalso.y,
      meninoFalso.largura,
      meninoFalso.altura
    );

    return;
  }

  imagemAtual = meninoFalso.andando
    ? imagemMeninoFalsoAndando
    : imagemMeninoFalsoParado;

  desenharImagemVirada(
    imagemAtual,
    meninoFalso.x,
    meninoFalso.y,
    meninoFalso.largura,
    meninoFalso.altura,
    meninoFalso.direcao
  );
}

function desenharImagemRotacionada(imagem, x, y, largura, altura, anguloGraus) {
  contexto.save();

  const posicaoX = Math.floor(x - cameraX);
  const posicaoY = Math.floor(y);

  contexto.translate(posicaoX + largura / 2, posicaoY + altura / 2);
  contexto.rotate(anguloGraus * Math.PI / 180);
  contexto.drawImage(
    imagem,
    -largura / 2,
    -altura / 2,
    largura,
    altura
  );

  contexto.restore();
}

function desenharAviso(x, y, texto) {
  contexto.fillStyle = 'rgba(0,0,0,0.56)';
  contexto.fillRect(x - 70, y, 140, 32);

  contexto.fillStyle = 'white';
  contexto.font = '18px Arial';
  contexto.textAlign = 'center';
  contexto.fillText(texto, x, y + 22);
  contexto.textAlign = 'start';
}

function desenharBotaoIniciar() {
  const x = botaoIniciar.x;
  const y = botaoIniciar.y;
  const largura = botaoIniciar.largura;
  const altura = botaoIniciar.altura;

  contexto.save();

  const gradiente = contexto.createLinearGradient(x, y, x, y + altura);

  if (mouseEmCimaDoBotaoIniciar) {
    gradiente.addColorStop(0, '#ffe680');
    gradiente.addColorStop(0.45, '#ffd21f');
    gradiente.addColorStop(1, '#b88600');
  } else {
    gradiente.addColorStop(0, '#ffd84a');
    gradiente.addColorStop(0.45, '#d8b300');
    gradiente.addColorStop(1, '#9c7600');
  }

  contexto.fillStyle = gradiente;

  contexto.beginPath();
  contexto.roundRect(x, y, largura, altura, 34);
  contexto.fill();

  contexto.strokeStyle = mouseEmCimaDoBotaoIniciar
    ? 'rgba(255,255,255,0.95)'
    : 'rgba(80,60,0,0.55)';
  contexto.lineWidth = mouseEmCimaDoBotaoIniciar ? 5 : 3;

  contexto.beginPath();
  contexto.roundRect(x, y, largura, altura, 34);
  contexto.stroke();

  contexto.fillStyle = 'rgba(255,255,255,0.24)';
  contexto.beginPath();
  contexto.roundRect(x + 16, y + 9, largura - 32, 22, 18);
  contexto.fill();

  contexto.fillStyle = '#000';
  contexto.font = 'bold 44px Arial';
  contexto.textAlign = 'center';
  contexto.textBaseline = 'middle';
  contexto.fillText('INICIAR', x + largura / 2, y + altura / 2 + 2);

  contexto.restore();
}

function desenharTelaInicial() {
  cameraX = 0;

  contexto.clearRect(0, 0, LARGURA_VISAO, ALTURA_VISAO);

  contexto.drawImage(
    imagemTelaInicial,
    0,
    0,
    LARGURA_VISAO,
    ALTURA_VISAO
  );

  desenharBotaoIniciar();
}

function desenharAvisoPrimeiroDia() {

  const largura = 460;
  const altura = 70;
  const x = (LARGURA_VISAO - largura) / 2;

  contexto.save();

  contexto.fillStyle = 'rgba(0,0,0,0.62)';
  contexto.fillRect(x, y, largura, altura);

  contexto.strokeStyle = 'rgba(255,255,255,0.20)';
  contexto.lineWidth = 2;
  contexto.strokeRect(x, y, largura, altura);

  contexto.fillStyle = 'white';
  contexto.font = 'bold 34px Arial';
  contexto.textAlign = 'center';
  contexto.fillText('Primeiro dia de aula', LARGURA_VISAO / 2, y + 45);

}

  contexto.fillStyle = 'rgba(0, 0, 0, 0.72)';

  contexto.lineWidth = 3;

  contexto.fillStyle = '#ffdddd';
  contexto.font = 'bold 34px Arial';

function desenharNotificacaoCelular() {

  const x = (LARGURA_VISAO - largura) / 2;

  contexto.fillStyle = 'rgba(0,0,0,0.78)';

function desenharOverlayCelular() {
  if (!celularAberto || !imagemCelularGrupoAtual) return;

  contexto.save();
  contexto.fillStyle = 'rgba(0,0,0,0.35)';
  contexto.fillRect(0, 0, LARGURA_VISAO, ALTURA_VISAO);

  const larguraCelular = 340;
  const alturaCelular = 520;
  const x = (LARGURA_VISAO - larguraCelular) / 2;
  const y = 70;

  contexto.drawImage(
    imagemCelularGrupoAtual,
    x,
    y,
    larguraCelular,
    alturaCelular
  );

  contexto.restore();
}

function desenharForaDaEscola() {
  cameraX = pegarCameraX(areaFora.larguraMapa);

  contexto.clearRect(0, 0, LARGURA_VISAO, ALTURA_VISAO);
  contexto.drawImage(imagemCeu, -cameraX * 0.25, 0, areaFora.larguraMapa, areaFora.alturaMapa);

  const escola = areaFora.escola;

  contexto.drawImage(
    imagemEscola,
    escola.x - cameraX,
    escola.y,
    escola.largura,
    escola.altura
  );

  desenharChaoDeTijolo(cameraX, areaFora.chaoY, areaFora.larguraMapa, areaFora.alturaMapa);
  desenharTiago(cameraX);

  const centroTiago = tiago.x + tiago.largura / 2;
  podeInteragir = estaPerto(centroTiago, escola.portaX, 55) && tiago.noChao;

  desenharAviso(
    escola.portaX - cameraX,
    areaFora.chaoY - 70,
    podeInteragir ? 'Aperte E' : 'Entrada'
  );

  desenharAvisoPrimeiroDia();
}

function desenharAlunosDoCorredor() {
  if (alunosCorredorSumiram) return;

  desenharImagem(
    imagemMeninaLoiraParada,
    areaCorredor.aluno1X,
    areaCorredor.aluno1Y,
    TAMANHO_ALUNO_CORREDOR.largura,
    TAMANHO_ALUNO_CORREDOR.altura
  );

  desenharImagem(
    imagemMeninoAzulParado,
    areaCorredor.aluno2X,
    areaCorredor.aluno2Y,
    TAMANHO_ALUNO_CORREDOR.largura,
    TAMANHO_ALUNO_CORREDOR.altura
  );

  desenharImagem(
    imagemAlunoMochilaParado,
    areaCorredor.aluno3X,
    areaCorredor.aluno3Y,
    TAMANHO_ALUNO_CORREDOR.largura,
    TAMANHO_ALUNO_CORREDOR.altura
  );
}

function desenharCenaBananaNoCorredor() {
  if (cenaCorredorBanana === 'inativo') return;

  if (
    !meninoFalsoSaiuCorredor &&
    (
      cenaCorredorBanana === 'falso_trazendo' ||
      cenaCorredorBanana === 'escolha' ||
      cenaCorredorBanana === 'falso_colocando' ||
      cenaCorredorBanana === 'oculos_andando' ||
      cenaCorredorBanana === 'finalizado'
    )
  ) {
    desenharImagemVirada(
      cenaCorredorBanana === 'falso_trazendo' || cenaCorredorBanana === 'falso_colocando'
        ? imagemMeninoFalsoAndando
        : imagemMeninoFalsoParado,
      meninoFalsoCorredor.x,
      meninoFalsoCorredor.y,
      meninoFalsoCorredor.largura,
      meninoFalsoCorredor.altura,
      meninoFalsoCorredor.direcao
    );
  }

  if (cenaCorredorBanana === 'falso_trazendo' && !bananaNoChao) {
    desenharImagem(
      imagemCascaBanana,
      meninoFalsoCorredor.x + 75,
      meninoFalsoCorredor.y + 85,
      42,
      34
    );
  }

  if (bananaNoChao) {
    desenharImagem(
      imagemCascaBanana,
      banana.x,
      banana.y,
      banana.largura,
      banana.altura
    );
  }

  if (
    !meninoOculosSaiuCorredor &&
    (
      cenaCorredorBanana === 'oculos_andando' ||
      (cenaCorredorBanana === 'finalizado' && meninoOculosCaiu)
    )
  ) {
    if (meninoOculosCaiu) {
      desenharImagemRotacionada(
        imagemMeninoOculosParado,
        meninoOculosCorredor.x,
        meninoOculosCorredor.y + 80,
        meninoOculosCorredor.largura,
        meninoOculosCorredor.altura,
        -82
      );
    } else {
      desenharImagemVirada(
        imagemMeninoOculosAndando,
        meninoOculosCorredor.x,
        meninoOculosCorredor.y,
        meninoOculosCorredor.largura,
        meninoOculosCorredor.altura,
        -1
      );
    }
  }
}

function desenharCenaCorredorInformatica() {
  if (cenaCorredorInformatica === 'inativo') return;

  if (cenaCorredorInformatica === 'falso_saindo' && !meninoFalsoSaiuCorredor) {
    desenharImagemVirada(
      imagemMeninoFalsoAndando,
      meninoFalsoCorredor.x,
      meninoFalsoCorredor.y,
      meninoFalsoCorredor.largura,
      meninoFalsoCorredor.altura,
      1
    );
  }

  if (cenaCorredorInformatica === 'oculos_levantando' && !meninoOculosSaiuCorredor) {
    desenharImagemVirada(
      imagemMeninoOculosAndando,
      meninoOculosCorredor.x,
      meninoOculosCorredor.y,
      meninoOculosCorredor.largura,
      meninoOculosCorredor.altura,
      1
    );
  }

  if (
    cenaCorredorInformatica === 'loira_chegando' ||
    cenaCorredorInformatica === 'loira_dialogo'
  ) {
    desenharImagemVirada(
      imagemMeninaLoiraAndando,
      meninaLoiraCorredor.x,
      meninaLoiraCorredor.y,
      meninaLoiraCorredor.largura,
      meninaLoiraCorredor.altura,
      meninaLoiraCorredor.direcao
    );
  }
}

function desenharCorredor() {
  cameraX = pegarCameraX(areaCorredor.larguraMapa);

  contexto.clearRect(0, 0, LARGURA_VISAO, ALTURA_VISAO);

  contexto.drawImage(
    imagemCorredor,
    -cameraX,
    0,
    areaCorredor.larguraMapa,
    areaCorredor.alturaMapa
  );

  desenharAlunosDoCorredor();
  desenharCenaBananaNoCorredor();
  desenharCenaCorredorInformatica();

  desenharTiago(cameraX);

  const centroTiago = tiago.x + tiago.largura / 2;

  if (cenaCorredorBanana !== 'inativo' && cenaCorredorBanana !== 'finalizado') {
    return;
  }

  if (entradaInformaticaLiberada) {
    podeInteragir = estaPerto(centroTiago, areaCorredor.informaticaX, 80) && tiago.noChao;

    desenharAviso(
      areaCorredor.informaticaX - cameraX,
      areaCorredor.chaoY - 125,
      podeInteragir ? 'Aperte E' : 'Informática'
    );

    return;
  }

  if (cenaCorredorInformatica !== 'inativo') {
    return;
  }

  if (!intervaloLiberado) {
    podeInteragir = estaPerto(centroTiago, areaCorredor.sala103X, 70) && tiago.noChao;

    desenharAviso(
      areaCorredor.sala103X - cameraX,
      areaCorredor.chaoY - 125,
      podeInteragir ? 'Aperte E' : 'Sala 103'
    );
  } else if (cenaCorredorBanana === 'inativo') {
    podeInteragir = estaPerto(centroTiago, areaCorredor.patioX, 90) && tiago.noChao;

    desenharAviso(
      areaCorredor.patioX - cameraX,
      areaCorredor.chaoY - 125,
      podeInteragir ? 'Aperte E' : 'Pátio'
    );
  }
  desenharNotificacaoCelular();
  desenharOverlayCelular();
}

function desenharAlunosDaSala() {
  if (alunosForamIntervalo) return;

  if (!meninoFalsoSaiuDaCadeira) {
    desenharAlunoSentado(
      imagemAlunoVerdeSentado,
      areaSala.alunoVerdeX,
      areaSala.alunoVerdeY
    );
  }

  desenharAlunoSentado(
    imagemMeninaLoiraSentada,
    areaSala.meninaLoiraX,
    areaSala.meninaLoiraY
  );

  if (tiagoSentado) {
    desenharTiagoSentado();
  }

  desenharAlunoSentado(
    imagemMeninoAzulSentado,
    areaSala.meninoAzulX,
    areaSala.meninoAzulY
  );

  desenharAlunoSentado(
    imagemMeninoOculosSentado,
    areaSala.meninoOculosX,
    areaSala.meninoOculosY
  );
}

function desenharSala() {
  cameraX = pegarCameraX(areaSala.larguraMapa);

  contexto.clearRect(0, 0, LARGURA_VISAO, ALTURA_VISAO);

  contexto.drawImage(
    imagemSala,
    areaSala.imagemX - cameraX,
    areaSala.imagemY,
    areaSala.imagemLargura,
    areaSala.imagemAltura
  );

  desenharAlunosDaSala();

  if (!tiagoSentado) {
    desenharTiago(cameraX);

    const centroTiago = tiago.x + tiago.largura / 2;

    if (!alunosForamIntervalo) {
      podeInteragir = estaPerto(centroTiago, areaSala.cadeiraVagaX + 60, 120) && tiago.noChao;

      desenharAviso(
        areaSala.cadeiraVagaX + 60 - cameraX,
        areaSala.chaoY - 160,
        podeInteragir ? 'Aperte E' : 'Cadeira'
      );
    } else {
      podeInteragir = estaPerto(centroTiago, areaSala.portaX, 100) && tiago.noChao;

      desenharAviso(
        areaSala.portaX - cameraX,
        areaSala.chaoY - 160,
        podeInteragir ? 'Aperte E' : 'Porta'
      );
    }
  }

  if (meninoFalsoSaiuDaCadeira && !alunosForamIntervalo) {
    desenharMeninoFalso(cameraX);
  }

  desenharAvisoAlarmeTocando();
}

function desenharPatio() {
  cameraX = pegarCameraX(areaPatio.larguraMapa);

  contexto.clearRect(0, 0, LARGURA_VISAO, ALTURA_VISAO);

  contexto.drawImage(
    imagemPatio,
    areaPatio.imagemX - cameraX,
    areaPatio.imagemY,
    areaPatio.imagemLargura,
    areaPatio.imagemAltura
  );

  if (!personagensPatioSumiram) {
    desenharImagem(
      imagemMeninaLoiraParada,
      areaPatio.meninaLoiraX,
      areaPatio.meninaLoiraY,
      TAMANHO_PERSONAGEM_PATIO.largura,
      TAMANHO_PERSONAGEM_PATIO.altura
    );

    desenharImagem(
      imagemAlunoMochilaParado,
      areaPatio.alunoMochilaX,
      areaPatio.alunoMochilaY,
      TAMANHO_PERSONAGEM_PATIO.largura,
      TAMANHO_PERSONAGEM_PATIO.altura
    );

    desenharImagem(
      imagemMeninoOculosParado,
      areaPatio.meninoOculosX,
      areaPatio.meninoOculosY,
      TAMANHO_PERSONAGEM_PATIO.largura,
      TAMANHO_PERSONAGEM_PATIO.altura
    );

    desenharImagem(
      imagemAlunoVinhoParado,
      areaPatio.alunoVinhoX,
      areaPatio.alunoVinhoY,
      TAMANHO_PERSONAGEM_PATIO.largura,
      TAMANHO_PERSONAGEM_PATIO.altura
    );

    if (!meninaCadeiranteSaiu) {
      const imagemAtualCadeirante =
        cenaPatio === 'cadeirante_saindo'
          ? imagemMeninaCadeiranteChorando
          : imagemMeninaCadeirante;

      desenharImagemVirada(
        imagemAtualCadeirante,
        meninaCadeirantePatio.x,
        meninaCadeirantePatio.y,
        meninaCadeirantePatio.largura,
        meninaCadeirantePatio.altura,
        -1
      );
    }

    desenharImagem(
      imagemMeninoAzulParado,
      areaPatio.meninoAzulX,
      areaPatio.meninoAzulY,
      TAMANHO_PERSONAGEM_PATIO.largura,
      TAMANHO_PERSONAGEM_PATIO.altura
    );

    desenharImagem(
      imagemMeninaAzulParada,
      areaPatio.meninaAzulX,
      areaPatio.meninaAzulY,
      TAMANHO_PERSONAGEM_PATIO.largura,
      TAMANHO_PERSONAGEM_PATIO.altura
    );

    desenharImagem(
      imagemMeninaVerdeParada,
      areaPatio.meninaVerdeX,
      areaPatio.meninaVerdeY,
      TAMANHO_PERSONAGEM_PATIO.largura,
      TAMANHO_PERSONAGEM_PATIO.altura
    );
  }

  if (!meninoFalsoSaiuPatio) {
    const imagemAtualFalsoPatio =
      cenaPatio === 'falso_saindo'
        ? imagemMeninoFalsoAndando
        : imagemMeninoFalsoParado;

    desenharImagemVirada(
      imagemAtualFalsoPatio,
      meninoFalsoPatio.x,
      meninoFalsoPatio.y,
      meninoFalsoPatio.largura,
      meninoFalsoPatio.altura,
      -1
    );
  }

  desenharTiago(cameraX);

  const centroTiago = tiago.x + tiago.largura / 2;

  podeInteragir =
    estaPerto(centroTiago, areaPatio.meninoFalsoX + 100, 150) &&
    tiago.noChao &&
    cenaPatio === 'livre';

  if (cenaPatio === 'livre') {
    desenharAviso(
      areaPatio.meninoFalsoX + 100 - cameraX,
      areaPatio.chaoY - 190,
      podeInteragir ? 'Aperte E' : 'Arthur'
    );
  }

  if (saidaPatioLiberada) {
    const pertoSaida = estaPerto(centroTiago, areaPatio.portaSaidaX, 110) && tiago.noChao;

    desenharAviso(
      areaPatio.portaSaidaX - cameraX,
      areaPatio.chaoY - 190,
      pertoSaida ? 'Aperte E' : 'Saída'
    );
  }

  desenharAvisoAlarmeTocando();
}

function desenharInformatica() {
  cameraX = pegarCameraX(areaInformatica.larguraMapa);

  contexto.clearRect(0, 0, LARGURA_VISAO, ALTURA_VISAO);

  contexto.drawImage(
    imagemSalaInformatica,
    areaInformatica.imagemX - cameraX,
    areaInformatica.imagemY,
    areaInformatica.imagemLargura,
    areaInformatica.imagemAltura
  );

  if (!arthurSaiuInformatica) {
    const imagemArthurInformatica = cenaInformatica === 'saindo_da_sala'
      ? imagemMeninoFalsoAndando
      : imagemMeninoFalsoParado;

    desenharImagemVirada(
      imagemArthurInformatica,
      meninoFalsoInformatica.x,
      meninoFalsoInformatica.y,
      meninoFalsoInformatica.largura,
      meninoFalsoInformatica.altura,
      meninoFalsoInformatica.direcao
    );
  }

  if (meninoFalsoMexendoCelular && !arthurSaiuInformatica) {
    desenharImagem(
      imagemCelular,
      meninoFalsoInformatica.x + 95,
      meninoFalsoInformatica.y + 118,
      TAMANHO_CELULAR.largura,
      TAMANHO_CELULAR.altura
    );
  }

  desenharTiago(cameraX);

  if (tiagoMexeuNoCelular) {
    desenharImagem(
      imagemCelular,
      tiago.x + 95,
      tiago.y + 120,
      TAMANHO_CELULAR.largura,
      TAMANHO_CELULAR.altura
    );
  }

  if (professorNaSala) {
    const imagemProfessorAtual = professorAndando
      ? imagemProfessorAndando
      : imagemProfessorParado;

    desenharImagemVirada(
      imagemProfessorAtual,
      professorInformatica.x,
      professorInformatica.y,
      professorInformatica.largura,
      professorInformatica.altura,
      professorInformatica.direcao
    );
  }

  if (saidaInformaticaLiberada) {
    const centroTiago = tiago.x + tiago.largura / 2;
    const pertoPorta = estaPerto(centroTiago, areaInformatica.portaX, 100) && tiago.noChao;

    desenharAviso(
      areaInformatica.portaX - cameraX,
      areaInformatica.chaoY - 200,
      pertoPorta ? 'Aperte E' : 'Saída'
    );
  }
}

function desenharJogo() {
  if (fase === 'inicio') {
    desenharTelaInicial();
  } else if (fase === 'fora') {
    desenharForaDaEscola();
  } else if (fase === 'corredor') {
    desenharCorredor();
  } else if (fase === 'sala') {
    desenharSala();
  } else if (fase === 'patio') {
    desenharPatio();
  } else if (fase === 'informatica') {
    desenharInformatica();
  }
}

function cicloDoJogo() {
  atualizarJogo();
  desenharJogo();
  requestAnimationFrame(cicloDoJogo);
}

/* CARREGAMENTO */
let imagensCarregadas = 0;

const imagensDoJogo = [
  imagemTelaInicial,

  imagemCeu,
  imagemEscola,
  imagemChao,
  imagemCorredor,
  imagemSala,
  imagemPatio,
  imagemSalaInformatica,

  imagemTiagoParado,
  imagemTiagoAndando1,
  imagemTiagoAndando2,
  imagemTiagoPulando,
  imagemTiagoSentado,

  imagemAlunoVerdeSentado,
  imagemMeninaLoiraSentada,
  imagemMeninoAzulSentado,
  imagemMeninoOculosSentado,

  imagemMeninoFalsoParado,
  imagemMeninoFalsoAndando,
  imagemMeninoFalsoCostas,
  imagemMeninoFalsoAndandoCostas,

  imagemMeninaCadeirante,
  imagemMeninaCadeiranteChorando,
  imagemMeninaLoiraParada,
  imagemMeninaLoiraAndando,
  imagemMeninoOculosParado,
  imagemMeninoOculosAndando,
  imagemCascaBanana,
  imagemMeninoAzulParado,

  imagemAlunoMochilaParado,
  imagemAlunoVinhoParado,
  imagemMeninaAzulParada,
  imagemMeninaVerdeParada,

  imagemProfessorParado,
  imagemProfessorAndando,
  imagemCelular,
  imagemCelularGrupoBase,
  imagemCelularGrupoZoando,
  imagemCelularGrupoDefendendo
];

imagensDoJogo.forEach(imagem => {
  imagem.onload = () => {
    imagensCarregadas++;

    if (imagensCarregadas === imagensDoJogo.length) {
      cicloDoJogo();
    }
  };

  imagem.onerror = () => {
    console.log('Erro ao carregar imagem:', imagem.src);
    imagensCarregadas++;

    if (imagensCarregadas === imagensDoJogo.length) {
      cicloDoJogo();
    }
  };
});
</script>
